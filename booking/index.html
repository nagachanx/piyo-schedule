<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約フォーム</title>
  <link rel="icon" href="../piyo-favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../piyo-theme.css">
  <script src="../piyo-theme.js"></script>
  <script src="../piyo-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#F5F5F4; --surface:#FFFFFF; --border:#E7E5E4; --border-strong:#D6D3D1;
      --text-1:#1C1917; --text-2:#44403C; --text-3:#78716C; --text-4:#A8A29E;
      --primary:#43A86A; --primary-dk:#2D8D57; --primary-lt:#C5E5D1; --primary-bg:#EEF7F1;
      --danger:#DC2626; --danger-bg:#FEF2F2;
      --radius-card:14px; --radius:8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text-1); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .topbar-inner { max-width: 1100px; width: 100%; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .brand-logo { width: 56px; height: 56px; flex-shrink: 0; }
    .brand-logo svg { width: 56px; height: 56px; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.15; gap: 4px; }
    .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
    .brand-sub { font-size: 12px; color: var(--text-3); }
    @media (max-width: 640px) {
      .topbar-inner { padding: 10px 16px; gap: 8px; }
      .brand-logo, .brand-logo svg { width: 40px; height: 40px; }
      .brand-name { font-size: 18px; }
      .brand-sub { display: none; }
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px 80px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 22px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
    .event-title { font-size: 26px; font-weight: 800; margin: 0 0 12px; line-height: 1.25; letter-spacing: -0.01em; }
    .event-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .event-desc { color: var(--text-3); font-size: 14px; white-space: pre-wrap; margin-top: 4px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: #F5F5F4; color: var(--text-2);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 12.5px; font-weight: 600; white-space: nowrap;
    }
    .chip svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-3); stroke-width: 2; }
    .chip strong { font-weight: 800; color: var(--text-1); margin: 0 1px; font-size: 13px; }

    .alert { padding: 10px 14px; border-radius: var(--radius); margin-bottom: 12px; font-size: 13px; }
    .alert.success { background: #ECFDF5; color: #065F46; border: 1px solid #BBF7D0; }
    .alert.error { background: var(--danger-bg); color: #991B1B; border: 1px solid #FECACA; }
    .alert.info { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 13px; font-weight: 600; color: var(--text-2); }
    .field input[type="text"], .field textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius);
      font-size: 14px; font-family: inherit; background: #fff; color: inherit;
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67,168,106,0.18); }

    .btn { padding: 10px 18px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-weight: 600; font-size: 13px; cursor: pointer; background: #fff; color: var(--text-1); font-family: inherit; }
    .btn:hover:not(:disabled) { background: #F5F5F4; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #5BB585 0%, #43A86A 50%, #2D8D57 100%); color: #fff; border: none; border-radius: var(--radius); padding: 12px 28px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 2px 4px rgba(67,168,106,0.25); transition: filter 0.15s; }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.06); }
    .btn-danger { background: #fff; color: var(--danger); border-color: #FECACA; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-bg); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Calendar */
    .cal-toolbar { display: flex; gap: 8px; align-items: center; margin: 18px 0 10px; flex-wrap: wrap; }
    .cal-toolbar .week-label { font-weight: 700; font-size: 15px; margin: 0 8px; }
    .cal-grid { display: grid; grid-template-columns: 56px repeat(5, 1fr) 0.7fr 0.7fr 56px; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); min-width: 760px; }
    .cal-grid .cal-head:nth-child(7), .cal-grid .cal-head:nth-child(8) { background: #FAFAF6; color: var(--text-3); }
    .cal-wrap { border-radius: var(--radius); }
    .cal-head { background: #FAFAF9; padding: 8px 4px; font-size: 12px; font-weight: 700; text-align: center; color: var(--text-2); border-bottom: 1px solid var(--border); position: sticky; top: 86px; z-index: 50; }
    .cal-head.today { background: #D4F0DE; color: #0F5132; }
    .cal-head .dow { display: block; font-size: 11px; color: var(--text-3); font-weight: 600; }
    .cal-time { background: #FAFAF9; padding: 0 4px; min-height: var(--cal-cell-min-h, 22px); line-height: 1; font-size: 11px; font-weight: 600; color: var(--text-3); display: flex; align-items: center; justify-content: center; font-variant-numeric: tabular-nums; }
    @media (max-width: 640px) { .cal-head { top: 62px; } }
    .cal-cell { background: #fff; min-height: var(--cal-cell-min-h, 22px); padding: 1px; position: relative; display: flex; }
    .cal-cell .slot { width: 100%; background: var(--primary-bg); border: 1px solid var(--primary-lt); border-radius: 4px; padding: 1px 4px; font-size: 11px; font-weight: 700; color: var(--primary-dk); text-align: center; cursor: pointer; transition: all 0.12s; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
    .cal-cell .slot:hover:not(.full):not(.past) { background: var(--primary); color: #fff; }
    .cal-cell .slot.full { background: #F3F4F6; border-color: var(--border-strong); color: var(--text-4); cursor: not-allowed; }
    .cal-cell .slot.past { background: #F3F4F6; border-color: var(--border-strong); color: var(--text-4); cursor: not-allowed; }

    .cal-mobile { display: none; }
    @media (max-width: 760px) {
      .cal-grid { display: none; }
      .cal-mobile { display: block; }
    }
    .cal-day { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .cal-day-head { background: #FAFAF9; padding: 10px 14px; font-weight: 700; font-size: 13px; }
    .cal-day-head.today { background: #D4F0DE; color: #0F5132; }
    .cal-day-slots { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
    .cal-day-slot { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border: 1px solid var(--primary-lt); border-radius: var(--radius); background: var(--primary-bg); cursor: pointer; }
    .cal-day-slot:hover:not(.full):not(.past) { background: var(--primary); color: #fff; }
    .cal-day-slot.full, .cal-day-slot.past { background: #F3F4F6; border-color: var(--border-strong); color: var(--text-4); cursor: not-allowed; }
    .cal-day-slot .time { font-weight: 700; font-size: 14px; }
    .cal-day-slot .right { font-size: 12px; font-weight: 600; }

    /* Modal */
    .modal-back { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
    .modal-back[hidden] { display: none; }
    .modal { background: #fff; border-radius: var(--radius-card); padding: 22px; max-width: 480px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.22); max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; font-weight: 800; margin: 0 0 12px; }
    .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; flex-wrap: wrap; }

    .url-box { display: flex; gap: 6px; align-items: center; background: #FAFAF9; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 6px 8px; }
    .url-box input { flex: 1; background: transparent; border: none; font-size: 12px; color: var(--text-1); font-family: monospace; min-width: 0; }
    .url-box input:focus { outline: none; }

    .meeting-card { background: var(--primary-bg); border: 1px solid var(--primary-lt); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; }
    .meeting-card .head { font-size: 12px; font-weight: 700; color: var(--primary-dk); margin-bottom: 4px; }
    .meeting-card a { color: var(--primary-dk); font-weight: 700; word-break: break-all; }

    footer { max-width: 1100px; margin: 24px auto; padding: 20px 24px; color: var(--text-4); font-size: 12px; text-align: center; }

    .center-msg { text-align: center; padding: 60px 16px; color: var(--text-3); font-size: 14px; }

    /* ─── Night mode 対応 ─── */
    html[data-theme="dark"] .card,
    html[data-theme="dark"] .modal,
    html[data-theme="dark"] .cal-day { background: var(--surface); border-color: var(--border); }
    /* カレンダー */
    html[data-theme="dark"] .cal-grid { background: var(--border); border-color: var(--border); }
    html[data-theme="dark"] .cal-cell { background: var(--surface); }
    html[data-theme="dark"] .cal-head { background: #2A2A2D; color: var(--text-2); border-bottom-color: var(--border); }
    html[data-theme="dark"] .cal-time { background: #1F1F22; color: var(--text-3); }
    html[data-theme="dark"] .cal-grid .cal-head:nth-child(7),
    html[data-theme="dark"] .cal-grid .cal-head:nth-child(8) { background: #25252A; }
    html[data-theme="dark"] .cal-head.today,
    html[data-theme="dark"] .cal-day-head.today { background: rgba(74, 222, 128, 0.20); color: #BBF7D0; }
    html[data-theme="dark"] .cal-day-head { background: #2A2A2D; }
    /* スロット枠（空き／満席／終了） */
    html[data-theme="dark"] .cal-cell .slot { background: rgba(74, 222, 128, 0.15); border-color: rgba(74, 222, 128, 0.35); color: #BBF7D0; }
    html[data-theme="dark"] .cal-cell .slot:hover:not(.full):not(.past) { background: var(--primary); color: #0B1410; }
    html[data-theme="dark"] .cal-cell .slot.full,
    html[data-theme="dark"] .cal-cell .slot.past { background: #2A2A2D; border-color: var(--border-strong); color: var(--text-4); }
    html[data-theme="dark"] .cal-day-slot { background: rgba(74, 222, 128, 0.12); border-color: rgba(74, 222, 128, 0.32); color: var(--text-1); }
    html[data-theme="dark"] .cal-day-slot:hover:not(.full):not(.past) { background: var(--primary); color: #0B1410; }
    html[data-theme="dark"] .cal-day-slot.full,
    html[data-theme="dark"] .cal-day-slot.past { background: #2A2A2D; border-color: var(--border-strong); color: var(--text-4); }
    /* チップ */
    html[data-theme="dark"] .chip { background: #2A2A2D; color: var(--text-2); border-color: var(--border); }
    html[data-theme="dark"] .chip svg { color: var(--text-3); }
    html[data-theme="dark"] .chip strong { color: var(--text-1); }
    /* ボタン */
    html[data-theme="dark"] .btn { background: var(--surface); color: var(--text-1); border-color: var(--border-strong); }
    html[data-theme="dark"] .btn:hover:not(:disabled) { background: #323237; }
    html[data-theme="dark"] .btn-danger { background: var(--surface); color: #FCA5A5; border-color: rgba(220, 38, 38, 0.4); }
    html[data-theme="dark"] .btn-danger:hover:not(:disabled) { background: rgba(220, 38, 38, 0.15); }
    /* アラート */
    html[data-theme="dark"] .alert.success { background: rgba(74, 222, 128, 0.12); color: #BBF7D0; border-color: rgba(74, 222, 128, 0.32); }
    html[data-theme="dark"] .alert.error { background: rgba(220, 38, 38, 0.15); color: #FCA5A5; border-color: rgba(220, 38, 38, 0.4); }
    html[data-theme="dark"] .alert.info { background: rgba(59, 130, 246, 0.15); color: #93C5FD; border-color: rgba(59, 130, 246, 0.4); }
    /* ミーティングURLカード */
    html[data-theme="dark"] .meeting-card { background: rgba(74, 222, 128, 0.12); border-color: rgba(74, 222, 128, 0.32); }
    html[data-theme="dark"] .meeting-card .head,
    html[data-theme="dark"] .meeting-card a { color: #BBF7D0; }
    /* URLボックス */
    html[data-theme="dark"] .url-box { background: #2A2A2D; border-color: var(--border-strong); }
    html[data-theme="dark"] .url-box input { color: var(--text-1); }
  </style>
</head>
<body>

<header class="topbar" role="banner">
  <div class="topbar-inner">
    <div class="brand-logo" aria-hidden="true">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 9 C19 5 18 1 21 1 C22.5 1 23 4 24 9 Z" fill="#FCD34D" stroke="#3D2F1F" stroke-width="1.1" stroke-linejoin="round"/>
        <path d="M24 9 C29 5 30 1 27 1 C25.5 1 25 4 24 9 Z" fill="#FCD34D" stroke="#3D2F1F" stroke-width="1.1" stroke-linejoin="round"/>
        <circle cx="24" cy="28" r="19" fill="#FCD34D" stroke="#3D2F1F" stroke-width="1.2"/>
        <clipPath id="piyoBody"><circle cx="24" cy="28" r="18"/></clipPath>
        <rect x="0" y="15" width="48" height="22" fill="#F5EFE0" clip-path="url(#piyoBody)"/>
        <path d="M20 19.5 Q19 19.8 18 20.5" stroke="#3D2F1F" stroke-width="1.0" fill="none" stroke-linecap="round"/>
        <path d="M28 19.5 Q29 19.8 30 20.5" stroke="#3D2F1F" stroke-width="1.0" fill="none" stroke-linecap="round"/>
        <circle class="piyo-eye" cx="15.5" cy="28" r="1.5" fill="#3D2F1F"/>
        <circle class="piyo-eye" cx="32.5" cy="28" r="1.5" fill="#3D2F1F"/>
        <path d="M24 25 Q18 28 19.5 32 Q24 34.2 28.5 32 Q30 28 24 25 Z" fill="#FCD34D"/>
        <path d="M19.5 32 Q24 34.2 28.5 32" stroke="#3D2F1F" stroke-width="1.0" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">予約フォーム</span>
      <span class="brand-sub">ぴよツールズ</span>
    </div>
  </div>
</header>

<div class="container">
  <div id="alert-area"></div>

  <div id="screen-loading" class="center-msg">読み込み中…</div>

  <div id="screen-cancel" hidden></div>

  <div id="screen-main" hidden>
    <div class="card">
      <h1 id="ev-title" class="event-title">—</h1>
      <div class="event-chips">
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          1枠 <strong id="ev-duration">—</strong> 分
        </span>
        <span class="chip" id="ev-cap-chip" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          1枠 <strong id="ev-cap">—</strong> 名
        </span>
      </div>
      <div id="ev-desc" class="event-desc"></div>
    </div>

    <div class="cal-toolbar">
      <button class="btn btn-sm" id="cal-prev">← 前週</button>
      <span class="week-label" id="cal-week-label">—</span>
      <button class="btn btn-sm" id="cal-next">翌週 →</button>
      <button class="btn btn-sm" id="cal-today">今週</button>
      <span style="flex:1"></span>
      <span style="font-size:12px;color:var(--text-3)">空き枠を選んで予約してください</span>
    </div>

    <div class="cal-wrap">
      <div id="cal-grid" class="cal-grid"></div>
    </div>
    <div id="cal-mobile" class="cal-mobile"></div>
  </div>

  <div id="screen-deleted" hidden class="center-msg">
    <div style="font-size:48px;margin-bottom:14px">📭</div>
    <div style="font-size:18px;font-weight:700;color:var(--text-1);margin-bottom:6px">このイベントは終了しました</div>
    <div>イベントが削除されたか、URLが正しくありません。</div>
  </div>
</div>

<div id="modal" class="modal-back" hidden>
  <div class="modal" id="modal-body"></div>
</div>

<footer>
  ぴよツールズ 予約フォーム
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = (window.PIYO_CONFIG && window.PIYO_CONFIG.SUPABASE_URL) || '';
const SUPABASE_ANON_KEY = (window.PIYO_CONFIG && window.PIYO_CONFIG.SUPABASE_ANON_KEY) || '';
const supa = (SUPABASE_URL && SUPABASE_ANON_KEY)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

const DOW_JP = ['日','月','火','水','木','金','土'];
const PAD = n => String(n).padStart(2,'0');
// 週の始まりは月曜日
function startOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate() - ((x.getDay() + 6) % 7)); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtMD(d){ return `${PAD(d.getMonth()+1)}/${PAD(d.getDate())}`; }
function fmtTime(d){ return `${PAD(d.getHours())}:${PAD(d.getMinutes())}`; }
function fmtDateTime(d){ return `${fmtMD(d)}(${DOW_JP[d.getDay()]}) ${fmtTime(d)}`; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function genToken(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

// ─── カレンダー追加用ヘルパー（Outlook / Google / ICS） ───
function utcCompact(d){
  const p = n => String(n).padStart(2,'0');
  return d.getUTCFullYear() + p(d.getUTCMonth()+1) + p(d.getUTCDate()) + 'T' +
         p(d.getUTCHours()) + p(d.getUTCMinutes()) + p(d.getUTCSeconds()) + 'Z';
}
// 場所＋ミーティングURL を1つの文字列にまとめる（Outlookの「ルームまたは場所」欄に入れる）
function buildLocationField(location, meetingUrl){
  const parts = [];
  if (location) parts.push(location);
  if (meetingUrl) parts.push(meetingUrl);
  return parts.join(' / ');
}
// プレーンテキスト本文（Google / ICS 用）
function buildEventBody(desc, cancelUrl){
  const lines = [];
  if (desc) lines.push(desc, '');
  if (cancelUrl) {
    lines.push('🔗 予約管理URL（キャンセル用）');
    lines.push(cancelUrl);
    lines.push('このURLでいつでもキャンセル・確認できます。控えとして保存してください。');
  }
  return lines.join('\n');
}
// HTML本文（Outlook 用：Outlook はbodyをHTMLとしてレンダリングするため改行を <br> に）
function buildOutlookBody(desc, cancelUrl){
  const escapeHtmlOut = s => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const parts = [];
  if (desc) parts.push(escapeHtmlOut(desc).replace(/\n/g, '<br>'));
  if (cancelUrl) {
    if (parts.length) parts.push('<br><br>');
    parts.push('🔗 <strong>予約管理URL（キャンセル用）</strong><br>');
    parts.push('<a href="' + escapeHtmlOut(cancelUrl) + '">' + escapeHtmlOut(cancelUrl) + '</a><br>');
    parts.push('このURLでいつでもキャンセル・確認できます。控えとして保存してください。');
  }
  return parts.join('');
}
function buildOutlookUrl(title, desc, location, meetingUrl, startsAt, endsAt, cancelUrl, attendeeEmail){
  const params = {
    path: '/calendar/action/compose', rru: 'addevent',
    subject: title,
    startdt: startsAt.toISOString(),
    enddt: endsAt.toISOString(),
    body: buildOutlookBody(desc, cancelUrl),
    location: buildLocationField(location, meetingUrl)
  };
  if (attendeeEmail) params.to = attendeeEmail;
  return 'https://outlook.office.com/calendar/0/deeplink/compose?' + new URLSearchParams(params).toString();
}
function buildGoogleUrl(title, desc, location, meetingUrl, startsAt, endsAt, cancelUrl, attendeeEmail){
  const params = {
    action: 'TEMPLATE',
    text: title,
    dates: utcCompact(startsAt) + '/' + utcCompact(endsAt),
    details: buildEventBody(desc, cancelUrl),
    location: buildLocationField(location, meetingUrl)
  };
  if (attendeeEmail) params.add = attendeeEmail;
  return 'https://calendar.google.com/calendar/render?' + new URLSearchParams(params).toString();
}
function buildIcs(title, desc, location, meetingUrl, startsAt, endsAt, uid, cancelUrl, attendeeEmail){
  const esc = s => String(s == null ? '' : s)
    .replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//PiyoTools//Booking//JP',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:' + uid + '@piyo-tools',
    'DTSTAMP:' + utcCompact(new Date()),
    'DTSTART:' + utcCompact(startsAt),
    'DTEND:' + utcCompact(endsAt),
    'SUMMARY:' + esc(title),
    'LOCATION:' + esc(buildLocationField(location, meetingUrl)),
    'DESCRIPTION:' + esc(buildEventBody(desc, cancelUrl))
  ];
  if (attendeeEmail) {
    lines.push('ATTENDEE;CN=管理者;ROLE=REQ-PARTICIPANT;PARTSTAT=NEEDS-ACTION;RSVP=TRUE:mailto:' + attendeeEmail);
  }
  lines.push('END:VEVENT', 'END:VCALENDAR');
  return lines.join('\r\n');
}
function downloadIcs(ics, filename){
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
function calendarAddHtml(){
  return `
    <div style="background:#FAFAF9;border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:8px">📅 自分のカレンダーに追加</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <a class="btn btn-sm" data-cal="outlook" href="#" target="_blank" rel="noopener">Outlook</a>
        <a class="btn btn-sm" data-cal="google"  href="#" target="_blank" rel="noopener">Google</a>
        <button class="btn btn-sm" data-cal="ics">.ics でダウンロード</button>
      </div>
      <div style="font-size:11px;color:var(--text-3);margin-top:6px">Outlook は職場アカウント用。Apple カレンダーは .ics をダウンロードしてください。</div>
    </div>`;
}
function wireCalendarAdd(scope, title, desc, location, meetingUrl, startsAt, endsAt, uid, cancelUrl, attendeeEmail){
  const outlook = scope.querySelector('[data-cal="outlook"]');
  const google  = scope.querySelector('[data-cal="google"]');
  const ics     = scope.querySelector('[data-cal="ics"]');
  if (outlook) outlook.href = buildOutlookUrl(title, desc, location, meetingUrl, startsAt, endsAt, cancelUrl, attendeeEmail);
  if (google)  google.href  = buildGoogleUrl(title, desc, location, meetingUrl, startsAt, endsAt, cancelUrl, attendeeEmail);
  if (ics) ics.addEventListener('click', () => {
    const safeTitle = (title || 'booking').replace(/[\\/:*?"<>|]/g, '_').slice(0, 40);
    downloadIcs(buildIcs(title, desc, location, meetingUrl, startsAt, endsAt, uid, cancelUrl, attendeeEmail), safeTitle + '.ics');
  });
}

const state = { eventId: null, cancelToken: null, event: null, weekStart: startOfWeek(new Date()), slots: [], resCounts: {} };

// localStorage：自分の予約履歴
const MY_KEY = 'piyo-booking-mine';

// ─── 初期化 ───
const params = new URLSearchParams(location.search);
state.eventId = params.get('id');
state.cancelToken = params.get('t');

if (!state.eventId) {
  document.getElementById('screen-loading').hidden = true;
  document.getElementById('screen-deleted').hidden = false;
} else {
  loadEvent();
}

async function loadEvent(){
  if (!supa) {
    showAlert('error', 'Supabase接続情報が未設定です');
    document.getElementById('screen-loading').hidden = true;
    return;
  }
  const { data: ev, error } = await supa.from('bookings').select('*').eq('id', state.eventId).maybeSingle();
  if (error || !ev) {
    document.getElementById('screen-loading').hidden = true;
    document.getElementById('screen-deleted').hidden = false;
    return;
  }
  state.event = ev;
  document.title = `${ev.title} — 予約フォーム`;

  // キャンセルトークン付きアクセス → キャンセル画面
  if (state.cancelToken) {
    await renderCancelScreen();
    return;
  }

  // 通常表示
  document.getElementById('ev-title').textContent = ev.title;
  document.getElementById('ev-desc').textContent = ev.description || '';
  document.getElementById('ev-duration').textContent = ev.slot_duration_min;
  // 定員チップ：一律モードのときだけ表示（個別モードでは枠ごとに違うので表示しない）
  const capChip = document.getElementById('ev-cap-chip');
  if (ev.capacity_mode === 'uniform') {
    document.getElementById('ev-cap').textContent = ev.default_capacity;
    capChip.hidden = false;
  } else {
    capChip.hidden = true;
  }
  // セル高さを時間に比例（15分=20px、30分=40px、45分=60px、60分=80px）— 1時間あたり80pxを確保
  document.documentElement.style.setProperty('--cal-cell-min-h', ((ev.slot_duration_min / 15) * 20) + 'px');
  document.getElementById('screen-loading').hidden = true;
  document.getElementById('screen-main').hidden = false;
  await loadSlots();
}

async function loadSlots(){
  const { data: slots } = await supa.from('booking_slots').select('*').eq('booking_id', state.eventId).order('starts_at');
  state.slots = slots || [];
  const ids = state.slots.map(s => s.id);
  state.resCounts = {};
  if (ids.length) {
    const { data: res } = await supa.from('booking_reservations').select('slot_id').in('slot_id', ids);
    (res || []).forEach(r => { state.resCounts[r.slot_id] = (state.resCounts[r.slot_id] || 0) + 1; });
  }
  renderCalendar();
}

function findSlot(d){ return state.slots.find(s => new Date(s.starts_at).getTime() === d.getTime()); }
function isFull(slot){ return (state.resCounts[slot.id] || 0) >= slot.capacity; }

function renderCalendar(){
  const dur = state.event.slot_duration_min;
  const startHour = 8, endHour = 20;
  const slotsPerHour = 60 / dur;
  const ws = state.weekStart;
  const we = addDays(ws, 6);
  document.getElementById('cal-week-label').textContent = `${fmtMD(ws)} 〜 ${fmtMD(we)}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const now = new Date();
  // ヘッダ（左端：時刻 / 7日間 / 右端：時刻）
  const empty = document.createElement('div'); empty.className='cal-head'; grid.appendChild(empty);
  for (let i=0;i<7;i++){
    const d = addDays(ws, i);
    const head = document.createElement('div');
    head.className = 'cal-head' + (sameDay(d, now) ? ' today' : '');
    head.innerHTML = `${fmtMD(d)}<span class="dow">${DOW_JP[d.getDay()]}</span>`;
    grid.appendChild(head);
  }
  const emptyR = document.createElement('div'); emptyR.className='cal-head'; grid.appendChild(emptyR);  // 右端時刻カラム用
  for (let h=startHour; h<endHour; h++){
    for (let s=0;s<slotsPerHour;s++){
      const mins = s * dur;
      const timeText = `${PAD(h)}:${PAD(mins)}`;
      // 左の時刻ラベル
      const tLeft = document.createElement('div'); tLeft.className='cal-time'; tLeft.textContent = timeText;
      grid.appendChild(tLeft);
      // 7日分のデータセル
      for (let dd=0; dd<7; dd++){
        const day = addDays(ws, dd);
        const cellStart = new Date(day); cellStart.setHours(h, mins, 0, 0);
        const cell = document.createElement('div'); cell.className = 'cal-cell';
        const slot = findSlot(cellStart);
        if (slot) {
          const isPast = cellStart < now;
          const full = isFull(slot);
          const slotEl = document.createElement('div');
          slotEl.className = 'slot' + (full ? ' full' : '') + (isPast ? ' past' : '');
          const count = state.resCounts[slot.id] || 0;
          if (isPast) slotEl.textContent = '終了';
          else if (full) slotEl.textContent = '満席';
          else if (slot.capacity === 1) slotEl.textContent = '◯';
          else slotEl.textContent = `残${slot.capacity - count}`;
          if (!isPast && !full) slotEl.addEventListener('click', () => openReserveDialog(slot, cellStart));
          cell.appendChild(slotEl);
        }
        grid.appendChild(cell);
      }
      // 右の時刻ラベル
      const tRight = document.createElement('div'); tRight.className='cal-time right'; tRight.textContent = timeText;
      grid.appendChild(tRight);
    }
  }

  // モバイル
  const mob = document.getElementById('cal-mobile');
  mob.innerHTML = '';
  for (let dd=0; dd<7; dd++){
    const day = addDays(ws, dd);
    const dayBox = document.createElement('div'); dayBox.className = 'cal-day';
    const head = document.createElement('div');
    head.className = 'cal-day-head' + (sameDay(day, now) ? ' today' : '');
    head.textContent = `${fmtMD(day)}（${DOW_JP[day.getDay()]}）`;
    dayBox.appendChild(head);
    const slotsBox = document.createElement('div'); slotsBox.className = 'cal-day-slots';
    const daySlots = state.slots.filter(s => sameDay(new Date(s.starts_at), day)).sort((a,b) => new Date(a.starts_at) - new Date(b.starts_at));
    if (!daySlots.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:10px;color:var(--text-3);font-size:12px;text-align:center';
      empty.textContent = '空き枠なし';
      slotsBox.appendChild(empty);
    } else {
      daySlots.forEach(slot => {
        const startsAt = new Date(slot.starts_at);
        const isPast = startsAt < now;
        const full = isFull(slot);
        const row = document.createElement('div');
        row.className = 'cal-day-slot' + (full ? ' full' : '') + (isPast ? ' past' : '');
        const t = document.createElement('span'); t.className='time'; t.textContent = fmtTime(startsAt);
        const right = document.createElement('span'); right.className='right';
        const count = state.resCounts[slot.id] || 0;
        if (isPast) right.textContent = '終了';
        else if (full) right.textContent = '満席';
        else if (slot.capacity === 1) right.textContent = '空き';
        else right.textContent = `残り ${slot.capacity - count} 名`;
        row.appendChild(t); row.appendChild(right);
        if (!isPast && !full) row.addEventListener('click', () => openReserveDialog(slot, startsAt));
        slotsBox.appendChild(row);
      });
    }
    dayBox.appendChild(slotsBox);
    mob.appendChild(dayBox);
  }
}

function openReserveDialog(slot, startsAt){
  const endsAt = new Date(startsAt.getTime() + state.event.slot_duration_min * 60000);
  showModal(`
    <h2>${fmtDateTime(startsAt)}–${fmtTime(endsAt)} を予約</h2>
    <div class="field">
      <label>お名前 <span style="color:var(--danger)">*</span></label>
      <input id="rsv-name" type="text" maxlength="30" placeholder="例：田中太郎">
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <textarea id="rsv-memo" maxlength="500" placeholder="ご相談内容など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" data-modal-close>キャンセル</button>
      <button class="btn-primary" id="rsv-submit">予約する</button>
    </div>
  `);
  document.querySelectorAll('[data-modal-close]').forEach(b => b.addEventListener('click', hideModal));
  document.getElementById('rsv-name').focus();
  document.getElementById('rsv-submit').addEventListener('click', () => submitReservation(slot, startsAt, endsAt));
}

async function submitReservation(slot, startsAt, endsAt){
  const name = document.getElementById('rsv-name').value.trim();
  const memo = document.getElementById('rsv-memo').value.trim();
  if (!name) { alert('お名前を入力してください'); return; }
  const submitBtn = document.getElementById('rsv-submit');
  submitBtn.disabled = true;

  // 直前に最新の予約数を再フェッチ（簡易race対策）
  const { data: cur } = await supa.from('booking_reservations').select('id', { count: 'exact', head: false }).eq('slot_id', slot.id);
  const currentCount = (cur || []).length;
  if (currentCount >= slot.capacity) {
    submitBtn.disabled = false;
    hideModal();
    showAlert('error', '申し訳ありません、既に満席になりました。別の枠をお選びください。');
    await loadSlots();
    return;
  }
  const token = genToken();
  const { data, error } = await supa.from('booking_reservations').insert({
    slot_id: slot.id, name, memo: memo || null, cancel_token: token
  }).select().single();
  submitBtn.disabled = false;
  if (error) { showAlert('error', '予約に失敗：' + error.message); return; }

  setMine(state.eventId, { reservationId: data.id, slotId: slot.id, token, startsAt: startsAt.toISOString(), name });

  // 主催者へメール通知（Power Automate経由・失敗しても予約は成立）
  notifyOrganizer(slot, startsAt, endsAt, name, memo).catch(() => {});

  // 予約完了画面へ
  hideModal();
  showCompletion(slot, startsAt, endsAt, name, token);
  await loadSlots();
}

// 主催者へ予約通知メール（Power Automate Webhook 経由）
async function notifyOrganizer(slot, startsAt, endsAt, name, memo){
  const ev = state.event;
  const notifyUrl = window.PIYO_CONFIG && window.PIYO_CONFIG.BOOKING_NOTIFY_URL;
  if (!notifyUrl || !ev.notify_email) return;  // 未設定なら何もしない

  const subject = `【予約フォーム】「${ev.title}」に新規予約 - ${name}さま`;
  const lines = [
    '新しい予約が入りました。',
    '',
    `■ イベント：${ev.title}`,
    `■ 日時：${fmtDateTime(startsAt)}〜${fmtTime(endsAt)}`,
    `■ お名前：${name}`,
  ];
  if (memo) lines.push(`■ メモ：${memo}`);
  if (ev.location) lines.push(`■ 場所：${ev.location}`);
  if (ev.meeting_url) lines.push(`■ ミーティングURL：${ev.meeting_url}`);
  lines.push('', '▼ 管理画面で予約一覧を確認');
  lines.push(`https://nagachanx.github.io/piyo-tools/booking.html?id=${ev.id}`);
  const body = lines.join('\n');

  try {
    await fetch(notifyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: ev.notify_email, subject, body })
    });
  } catch (e) {
    console.warn('通知メール送信失敗:', e);
  }
}
